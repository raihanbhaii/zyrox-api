services:
  - type: web
    name: tiktok-view-bot-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CHROME_BIN
        value: /usr/bin/google-chrome-stable
      - key: RENDER
        value: "true"
      - key: PORT
        value: "8000"
